<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;font-family:'Helvetica Neue',sans-serif;text-decoration:none;margin-bottom:1.5rem}
.back-link:hover{color:#3a6bc4}

.story p{margin-bottom:1.4rem}
.story h2{font-size:14px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#888;font-family:'Helvetica Neue',sans-serif;margin:2rem 0 1rem;padding-top:1rem;border-top:1px solid #e8e4dc}

#translation-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 2rem);max-width:680px;background:rgba(26,26,26,.93);color:#fff;padding:12px 20px;border-radius:14px;font-family:'Helvetica Neue',sans-serif;font-size:15px;z-index:1000;display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity .2s;pointer-events:none}
#translation-bar.visible{opacity:1;pointer-events:auto}

.nav-buttons{display:flex;gap:10px;margin-top:3rem;padding-top:1.5rem;border-top:1px solid #e8e4dc}
.nav-btn{flex:1;padding:12px;border:1px solid #e8e4dc;border-radius:10px;background:#fff;font-family:'Helvetica Neue',sans-serif;font-size:14px;color:#1a1a1a;text-decoration:none;text-align:center;transition:border-color .15s}
.nav-btn:hover{border-color:#b8cff5;color:#3a6bc4}
.nav-btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

<body>
<div class="container">
<a class="back-link" href="../../index.html">← Todas las historias</a>
<p class="chapter-label">Calmar la ansiedad · Historia 7</p>
<h1>Historia 7: Calmar la ansiedad</h1>
<div class="subtitle"><span>Toca cualquier palabra para ver su traducción</span></div>
<div class="audio-bar">
  <button class="play-btn" id="play-btn">
    <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>
  <div class="progress-wrap">
    <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
    <span class="time-display" id="time-display">0:00 / 0:00</span>
  </div>
</div>
<div class="story" id="story"></div>
<div class="nav-buttons">
  <a class="nav-btn" href="../salud-historia6/">← Anterior</a>
  <a class="nav-btn primary" href="../salud-historia8/">Siguiente →</a>
</div>
</div>
<div id="translation-bar"><span class="tw" id="tw"></span><span id="ta"></span></div>
<audio id="audio" src="https://ia600706.us.archive.org/29/items/historia-7-salud/Historia_7_salud.MP3" preload="auto"></audio>
<script>
const dict={
    "7":"seven",
    "historia":"history / story",
    "calmar":"to calm / soothe",
    "la":"the",
    "ansiedad":"anxiety",
    "a":"A / to",
    "un":"a / an",
    "paciente":"patient",
    "joven":"young",
    "tiene":"has",
    "miedo":"fear (tiene miedo = is afraid)",
    "porque":"because",
    "no":"no / not",
    "le":"to him / her",
    "gustan":"like (pleasing to)",
    "las":"the",
    "agujas":"needles",
    "enfermera":"nurse",
    "busca":"looks for / seeks",
    "hablar":"to speak / talk",
    "con":"with",
    "él":"he / him",
    "para":"for / in order to",
    "calmarlo":"to calm him",
    "ella":"she",
    "pide":"asks / requests",
    "que":"that",
    "respire":"breathes",
    "profundamente":"deeply",
    "explica":"explains",
    "cada":"each / every",
    "paso":"step",
    "voz":"voice",
    "suave":"soft / gentle",
    "está":"is",
    "muy":"very",
    "nervioso":"nervous",
    "y":"and",
    "tiembla":"trembles / shakes",
    "poco":"little (un poco = a little)",
    "dice":"says",
    "cierre":"close (imperative)",
    "los":"the",
    "ojos":"eyes",
    "piense":"think (imperative)",
    "en":"in / on",
    "lugar":"place",
    "tranquilo":"calm / quiet",
    "gracias":"thanks (gracias a = thanks to)",
    "comunicación":"communication",
    "de":"of / from",
    "se":"himself / herself",
    "relaja":"relaxes",
    "ya":"already / now (ya no = no longer)",
    "tanto":"so much",
    "b":"B",
    "busco":"I look for / seek",
    "pido":"I ask / request",
    "explico":"I explain",
    "digo":"I say / tell",
    "mi":"my",
    "preguntas":"questions",
    "habla":"speaks",
    "fuerte":"strong / loud",
    "qué":"what",
    "al":"to the",
    "haga":"does / make",
    "principio":"beginning",
    "funciona":"works / functions",
    "técnica":"technique",
    "sí":"yes",
    "final":"end"
};
const paras=[{"type":"h2","text":"A) Un paciente joven tiene miedo porque no le gustan las agujas. La enfermera busca hablar con él para calmarlo. Ella le pide que respire profundamente. Ella le explica cada paso con voz suave. El paciente está muy nervioso y tiembla un poco. La enfermera le dice: \"Cierre los ojos y piense en un lugar tranquilo\". Gracias a la comunicación de la enfermera, el paciente se relaja. Él ya no tiene tanto miedo."},{"type":"h2","text":"B) Un paciente joven tiene miedo porque no le gustan las agujas. Busco hablar con él para calmarlo. Le pido que respire profundamente. Le explico cada paso con voz suave. El paciente está muy nervioso y tiembla un poco. Le digo: \"Cierre los ojos y piense en un lugar tranquilo\". Gracias a mi comunicación, el paciente se relaja. Él ya no tiene tanto miedo."},{"type":"h2","text":"Preguntas:"},{"type":"p","text":"¿Le gustan las agujas al paciente? No, no le gustan las agujas."},{"type":"p","text":"¿Habla la enfermera con voz fuerte? No, ella habla con voz suave."},{"type":"p","text":"¿Qué le pide la enfermera al paciente que haga con los ojos? Ella le pide que cierre los ojos."},{"type":"p","text":"¿Está el paciente tranquilo al principio? No, él está muy nervioso y tiembla."},{"type":"p","text":"¿Funciona la técnica de la enfermera? Sí, el paciente se relaja al final."}];
const storyEl=document.getElementById('story');
paras.forEach(({type,text})=>{
  const el=document.createElement(type);
  text.split(/(\s+)/).forEach(token=>{
    if(/^\s+$/.test(token)){el.appendChild(document.createTextNode(token));return;}
    const clean=token.replace(/[¿¡.,;:!?()"«»""'\-—]/g,'').toLowerCase().trim();
    if(!clean){el.appendChild(document.createTextNode(token));return;}
    const s=document.createElement('span');s.className='w';s.textContent=token;s.dataset.word=clean;el.appendChild(s);
  });
  storyEl.appendChild(el);
});
const bar=document.getElementById('translation-bar');
const twEl=document.getElementById('tw'),taEl=document.getElementById('ta');
let aw=null;
storyEl.addEventListener('click',e=>{
  const w=e.target.closest('.w');if(!w)return;
  if(aw)aw.classList.remove('active');
  if(aw===w){aw=null;bar.classList.remove('visible');return;}
  aw=w;w.classList.add('active');
  const t=dict[w.dataset.word];
  twEl.textContent=w.dataset.word;taEl.textContent=t?'→ '+t:'(no en diccionario)';
  bar.classList.add('visible');
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.w')&&!e.target.closest('#translation-bar')){if(aw)aw.classList.remove('active');aw=null;bar.classList.remove('visible');}
});
const audio=document.getElementById('audio'),pb=document.getElementById('play-btn');
const pi=document.getElementById('play-icon'),pai=document.getElementById('pause-icon');
const pr=document.getElementById('progress'),te=document.getElementById('time-display');
function fmt(s){return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');}
audio.addEventListener('timeupdate',()=>{if(audio.duration){pr.value=(audio.currentTime/audio.duration)*100;te.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);}});
audio.addEventListener('ended',()=>{pi.style.display='';pai.style.display='none';});
pb.addEventListener('click',()=>{if(audio.paused){audio.play();pi.style.display='none';pai.style.display='';}else{audio.pause();pi.style.display='';pai.style.display='none';}});
pr.addEventListener('input',()=>{if(audio.duration)audio.currentTime=(pr.value/100)*audio.duration;});
</script>
</body>
</html>
