<body>
<div class="container">

<h1>Historia 6: Evaluando el dolor</h1>
<div class="subtitle"><span>Toca cualquier palabra para ver su traducción</span></div>
<div class="audio-bar">
  <button class="play-btn" id="play-btn">
    <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>

<audio id="audio" src="https://ia903105.us.archive.org/14/items/historia-6-salud/Historia_6_salud.MP3" preload="auto"></audio>
<script>
const dict={
    "6":"six",
    "historia":"history / story",
    "evaluando":"evaluating / assessing",
    "el":"the",
    "dolor":"pain",
    "a":"A / to",
    "señor":"Mr. / sir",
    "pedro":"Pedro",
    "tiene":"has",
    "mucho":"much / a lot of",
    "después":"after",
    "de":"of / from",
    "su":"his / her",
    "operación":"operation / surgery",
    "la":"the",
    "enfermera":"nurse",
    "isabel":"Isabel",
    "entra":"enters",
    "en":"in",
    "habitación":"room",
    "con":"with",
    "una":"a / an",
    "escala":"scale",
    "visual":"visual",
    "le":"to him / her",
    "pregunta":"asks / question",
    "del":"from the / of the",
    "uno":"one",
    "al":"to the",
    "diez":"ten",
    "cuánto":"how much",
    "duele":"hurts",
    "responde":"responds / answers",
    "que":"that",
    "un":"a / an",
    "ocho":"eight",
    "es":"is",
    "punzante":"sharp / stabbing",
    "y":"and",
    "está":"is",
    "abdomen":"abdomen / belly",
    "explica":"explains",
    "va":"goes (va a = is going to)",
    "administrar":"to administer",
    "analgésico":"painkiller / analgesic",
    "por":"by / through",
    "vía":"route / way",
    "intravenosa":"intravenous / IV",
    "ella":"she",
    "dice":"says",
    "disminuir":"to decrease / reduce",
    "quince":"fifteen",
    "minutos":"minutes",
    "b":"B",
    "entro":"I enter",
    "pregunto":"I ask",
    "explico":"I explain",
    "voy":"I go (voy a = I am going to)",
    "digo":"I say / tell",
    "preguntas":"questions",
    "poco":"little",
    "no":"no / not",
    "él":"he",
    "qué":"what",
    "herramienta":"tool",
    "usa":"uses",
    "tres":"three",
    "dónde":"where",
    "cómo":"how",
    "medicamento":"medicine / medication",
    "lo":"it"
};
const paras=[{"type":"h2","text":"A) El señor Pedro tiene mucho dolor después de su operación. La enfermera Isabel entra en la habitación con una escala visual. Isabel le pregunta: \"¿En una escala del uno al diez, cuánto le duele?\". El señor Pedro responde que le duele un ocho. El dolor es punzante y está en el abdomen. Isabel le explica que va a administrar un analgésico por la vía intravenosa. Ella le dice que el dolor va a disminuir en quince minutos."},{"type":"h2","text":"B) El señor Pedro tiene mucho dolor después de su operación. Entro en la habitación con una escala visual. Le pregunto: \"¿En una escala del uno al diez, cuánto le duele?\". El señor Pedro responde que le duele un ocho. El dolor es punzante y está en el abdomen. Le explico que voy a administrar un analgésico por la vía intravenosa. Le digo que el dolor va a disminuir en quince minutos."},{"type":"h2","text":"Preguntas:"},{"type":"p","text":"¿Tiene el señor Pedro poco dolor? No, él tiene mucho dolor."},{"type":"p","text":"¿Qué herramienta usa Isabel? Ella usa una escala visual del uno al diez."},{"type":"p","text":"¿Es el dolor un tres? No, el dolor es un ocho."},{"type":"p","text":"¿Dónde está el dolor? El dolor está en el abdomen."},{"type":"p","text":"¿Cómo va a administrar Isabel el medicamento? Ella lo va a administrar por vía intravenosa."}];
const storyEl=document.getElementById('story');
paras.forEach(({type,text})=>{
  const el=document.createElement(type);
  text.split(/(\s+)/).forEach(token=>{
    if(/^\s+$/.test(token)){el.appendChild(document.createTextNode(token));return;}
    const clean=token.replace(/[¿¡.,;:!?()"«»""'\-—]/g,'').toLowerCase().trim();
    if(!clean){el.appendChild(document.createTextNode(token));return;}
    const s=document.createElement('span');s.className='w';s.textContent=token;s.dataset.word=clean;el.appendChild(s);
  });
  storyEl.appendChild(el);
});
const bar=document.getElementById('translation-bar');
const twEl=document.getElementById('tw'),taEl=document.getElementById('ta');
let aw=null;
storyEl.addEventListener('click',e=>{
  const w=e.target.closest('.w');if(!w)return;
  if(aw)aw.classList.remove('active');
  if(aw===w){aw=null;bar.classList.remove('visible');return;}
  aw=w;w.classList.add('active');
  const t=dict[w.dataset.word];
  twEl.textContent=w.dataset.word;taEl.textContent=t?'→ '+t:'(no en diccionario)';
  bar.classList.add('visible');
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.w')&&!e.target.closest('#translation-bar')){if(aw)aw.classList.remove('active');aw=null;bar.classList.remove('visible');}
});
const audio=document.getElementById('audio'),pb=document.getElementById('play-btn');
const pi=document.getElementById('play-icon'),pai=document.getElementById('pause-icon');
const pr=document.getElementById('progress'),te=document.getElementById('time-display');
function fmt(s){return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');}
audio.addEventListener('timeupdate',()=>{if(audio.duration){pr.value=(audio.currentTime/audio.duration)*100;te.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);}});
audio.addEventListener('ended',()=>{pi.style.display='';pai.style.display='none';});
pb.addEventListener('click',()=>{if(audio.paused){audio.play();pi.style.display='none';pai.style.display='';}else{audio.pause();pi.style.display='';pai.style.display='none';}});
pr.addEventListener('input',()=>{if(audio.duration)audio.currentTime=(pr.value/100)*audio.duration;});
</script>
</body>
