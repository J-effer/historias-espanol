<div class="container">

<h1>Historia 5: El ingreso de la señora Marta</h1>
<div class="subtitle"><span>Toca cualquier palabra para ver su traducción</span></div>
<div class="audio-bar">
  <button class="play-btn" id="play-btn">
    <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>
  <div class="progress-wrap">

<audio id="audio" src="https://ia601603.us.archive.org/0/items/historia-5-salud/Historia_5_salud.MP3" preload="auto"></audio>
<script>
const dict={
    "5":"five",
    "historia":"history / story",
    "el":"the",
    "ingreso":"admission",
    "de":"of / from",
    "la":"the",
    "señora":"Mrs. / lady",
    "marta":"Marta",
    "a":"A / to",
    "llega":"arrives",
    "hoy":"today",
    "al":"to the",
    "hospital":"hospital",
    "para":"for",
    "una":"a / an",
    "cirugía":"surgery",
    "enfermera":"nurse",
    "lucía":"Lucía",
    "le":"to her / him",
    "da":"gives",
    "bienvenida":"welcome",
    "necesita":"needs",
    "confirmar":"to confirm",
    "los":"the",
    "datos":"data / details",
    "personales":"personal",
    "ella":"she",
    "pregunta":"asks / question",
    "nombre":"name",
    "completo":"full / complete",
    "y":"and",
    "fecha":"date",
    "nacimiento":"birth",
    "está":"is",
    "unida":"close to / attached",
    "su":"her / his",
    "hija":"daughter",
    "explica":"explains",
    "que":"that",
    "proceso":"process",
    "va":"goes (va a ser = is going to be)",
    "ser":"to be",
    "rápido":"fast / quick",
    "pide":"asks / requests",
    "firme":"signs (subjunctive)",
    "consentimiento":"consent",
    "informado":"informed",
    "firma":"signs",
    "documento":"document",
    "acompaña":"accompanies",
    "habitación":"room",
    "b":"B",
    "doy":"I give",
    "necesito":"I need",
    "pregunto":"I ask",
    "con":"with",
    "explico":"I explain",
    "pido":"I ask / request",
    "acompaño":"I accompany",
    "preguntas":"questions",
    "consulta":"consultation / appointment",
    "o":"or",
    "dirección":"address",
    "casa":"house",
    "no":"no / not",
    "sola":"alone",
    "largo":"long",
    "difícil":"difficult",
    "dice":"says",
    "qué":"what",
    "tiene":"has",
    "paciente":"patient"
};
const paras=[{"type":"h2","text":"A) La señora Marta llega hoy al hospital para una cirugía. La enfermera Lucía le da la bienvenida. Lucía necesita confirmar los datos personales. Ella pregunta el nombre completo y la fecha de nacimiento. La señora Marta está unida a su hija. Lucía le explica que el proceso va a ser rápido. Ella pide a Marta que firme el consentimiento informado. Marta firma el documento y Lucía la acompaña a su habitación."},{"type":"h2","text":"B) La señora Marta llega hoy al hospital para una cirugía. Le doy la bienvenida. Necesito confirmar los datos personales. Pregunto el nombre completo y la fecha de nacimiento. La señora Marta está con su hija. Le explico que el proceso va a ser rápido. Le pido que firme el consentimiento informado. Marta firma el documento y la acompaño a su habitación."},{"type":"h2","text":"Preguntas:"},{"type":"p","text":"¿Llega la señora Marta para una consulta o una cirugía? Ella llega para una cirugía."},{"type":"p","text":"¿Pregunta Lucía la dirección de la casa? No, ella pregunta el nombre y la fecha de nacimiento."},{"type":"p","text":"¿Está la señora Marta sola? No, ella está con su hija."},{"type":"p","text":"¿Es el proceso largo y difícil? No, Lucía dice que va a ser rápido."},{"type":"p","text":"¿Qué tiene que firmar la paciente? Ella tiene que firmar el consentimiento informado."}];
const storyEl=document.getElementById('story');
paras.forEach(({type,text})=>{
  const el=document.createElement(type);
  text.split(/(\s+)/).forEach(token=>{
    if(/^\s+$/.test(token)){el.appendChild(document.createTextNode(token));return;}
    const clean=token.replace(/[¿¡.,;:!?()"«»""'\-—]/g,'').toLowerCase().trim();
    if(!clean){el.appendChild(document.createTextNode(token));return;}
    const s=document.createElement('span');s.className='w';s.textContent=token;s.dataset.word=clean;el.appendChild(s);
  });
  storyEl.appendChild(el);
});
const bar=document.getElementById('translation-bar');
const twEl=document.getElementById('tw'),taEl=document.getElementById('ta');
let aw=null;
storyEl.addEventListener('click',e=>{
  const w=e.target.closest('.w');if(!w)return;
  if(aw)aw.classList.remove('active');
  if(aw===w){aw=null;bar.classList.remove('visible');return;}
  aw=w;w.classList.add('active');
  const t=dict[w.dataset.word];
  twEl.textContent=w.dataset.word;taEl.textContent=t?'→ '+t:'(no en diccionario)';
  bar.classList.add('visible');
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.w')&&!e.target.closest('#translation-bar')){if(aw)aw.classList.remove('active');aw=null;bar.classList.remove('visible');}
});
const audio=document.getElementById('audio'),pb=document.getElementById('play-btn');
const pi=document.getElementById('play-icon'),pai=document.getElementById('pause-icon');
const pr=document.getElementById('progress'),te=document.getElementById('time-display');
function fmt(s){return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');}
audio.addEventListener('timeupdate',()=>{if(audio.duration){pr.value=(audio.currentTime/audio.duration)*100;te.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);}});
audio.addEventListener('ended',()=>{pi.style.display='';pai.style.display='none';});
pb.addEventListener('click',()=>{if(audio.paused){audio.play();pi.style.display='none';pai.style.display='';}else{audio.pause();pi.style.display='';pai.style.display='none';}});
pr.addEventListener('input',()=>{if(audio.duration)audio.currentTime=(pr.value/100)*audio.duration;});
</script>
</body>
