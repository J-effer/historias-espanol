<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Enfermera Elena · Español Profesional: Salud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #faf9f6;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #888; font-family: 'Helvetica Neue', sans-serif;
      text-decoration: none; margin-bottom: 1.5rem;
    }
    .back-link:hover { color: #3a6bc4; }
    .chapter-label {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #aaa; font-family: 'Helvetica Neue', sans-serif; margin-bottom: 0.4rem;
    }
    h1 { font-size: 26px; font-weight: normal; color: #1a1a1a; margin-bottom: 0.4rem; line-height: 1.3; }
    .subtitle { margin-bottom: 1.8rem; }
    .subtitle span {
      display: inline-block; background: #eef4ff; color: #3a6bc4;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-family: 'Helvetica Neue', sans-serif;
    }
    .audio-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; background: #fff;
      border-radius: 12px; margin-bottom: 1.8rem; border: 1px solid #e8e4dc;
    }
    .play-btn {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd;
      background: #fff; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.15s;
    }
    .play-btn:hover { background: #f5f5f5; }
    .play-btn svg { width: 14px; height: 14px; fill: #1a1a1a; }
    .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    #progress {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: #e0dbd0; border-radius: 2px; cursor: pointer; outline: none;
    }
    #progress::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #1a1a1a; cursor: pointer;
    }
    #progress::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #1a1a1a; cursor: pointer; border: none;
    }
    .time-display { font-size: 12px; color: #999; font-family: 'Helvetica Neue', sans-serif; }
    .story { font-size: 18px; line-height: 2.1; color: #1a1a1a; }
    .story p { margin-bottom: 1.4rem; }
    .story h2 {
      font-size: 14px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #888;
      font-family: 'Helvetica Neue', sans-serif;
      margin: 2rem 0 1rem; padding-top: 1rem;
      border-top: 1px solid #e8e4dc;
    }
    .w { cursor: pointer; padding: 1px 3px; border-radius: 3px; transition: background 0.1s, color 0.1s; }
    .w:hover { background: #ddeaff; color: #1a4fa8; }
    .w.active { background: #ddeaff; color: #1a4fa8; }
    #translation-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 2rem); max-width: 680px;
      background: rgba(26,26,26,0.93); color: #fff;
      padding: 12px 20px; border-radius: 14px;
      font-family: 'Helvetica Neue', sans-serif; font-size: 15px;
      z-index: 1000; display: flex; align-items: center; justify-content: center; gap: 8px;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
    }
    #translation-bar.visible { opacity: 1; pointer-events: auto; }
    .tw { font-weight: 600; color: #85c1e9; }
    .tn { font-size: 12px; color: #aaa; margin-left: 4px; }
    .nav-buttons {
      display: flex; gap: 10px; margin-top: 3rem; padding-top: 1.5rem;
      border-top: 1px solid #e8e4dc;
    }
    .nav-btn {
      flex: 1; padding: 12px; border: 1px solid #e8e4dc; border-radius: 10px;
      background: #fff; font-family: 'Helvetica Neue', sans-serif; font-size: 14px;
      color: #1a1a1a; text-decoration: none; text-align: center; transition: border-color 0.15s;
    }
    .nav-btn:hover { border-color: #b8cff5; color: #3a6bc4; }
    .nav-btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .nav-btn.primary:hover { background: #333; border-color: #333; color: #fff; }
    @media (max-width: 600px) {
      h1 { font-size: 20px; }
      .story { font-size: 16px; line-height: 2; }
      #translation-bar { font-size: 14px; padding: 10px 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <a class="back-link" href="../../index.html">← Todas las historias</a>

  <p class="chapter-label">Español Profesional: Salud · Historia 1</p>
  <h1>La Enfermera Elena y el Paciente</h1>
  <div class="subtitle"><span>Toca cualquier palabra para ver su traducción</span></div>

  <div class="audio-bar">
    <button class="play-btn" id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <div class="progress-wrap">
      <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
      <span class="time-display" id="time-display">0:00 / 0:00</span>
    </div>
  </div>

  <div class="story" id="story"></div>

  <div class="nav-buttons">
    <a class="nav-btn" href="../../index.html">← Todas las historias</a>
    <a class="nav-btn primary" href="../salud-historia2/">Historia 2 →</a>
  </div>

</div>

<div id="translation-bar">
  <span class="tw" id="tw"></span>
  <span id="ta"></span>
  <span class="tn" id="tn"></span>
</div>

<audio id="audio" src="https://archive.org/download/historia-4-salud/Historia_1_salud.MP3" preload="auto"></audio>

<script>
  const dict = {
    "historia": "story", "uno": "one", "la": "the", "enfermera": "nurse", "elena": "Elena",
    "y": "and", "el": "the", "paciente": "patient", "escuchemos": "let's listen", "de": "of / from",
    "que": "that / who", "es": "is", "por": "for", "favor": "favor (por favor = please)",
    "escucha": "listen", "después": "after / later", "contada": "told", "intenta": "try",
    "contestar": "to answer", "algunas": "some", "preguntas": "questions", "a": "to",
    "narración": "narration", "en": "in", "tercera": "third", "persona": "person",
    "profesional": "professional", "ella": "she", "trabaja": "works", "un": "a / an",
    "hospital": "hospital", "grande": "big / large", "señor": "Mr. / sir", "garcía": "García",
    "tiene": "has", "dolor": "pain", "espalda": "back", "muy": "very", "fuerte": "strong",
    "ayuda": "helps", "al": "to the", "le": "to him / her", "da": "gives", "una": "a / an",
    "pastilla": "pill", "para": "for", "amable": "kind / nice", "siempre": "always",
    "cuida": "takes care of", "sus": "her / his / their", "pacientes": "patients",
    "con": "with", "mucho": "much / a lot of", "cariño": "affection / care",
    "primera": "first", "soy": "I am", "trabajo": "I work", "ayudo": "I help",
    "doy": "I give", "mis": "my", "cuido": "I take care of", "repetir": "to repeat",
    "entender": "to understand", "doctora": "doctor (female)", "no": "no / not",
    "escuela": "school", "cabeza": "head", "suave": "soft / mild", "qué": "what",
    "grosera": "rude", "segunda": "second", "vez": "time / once", "también": "also",
    "señora": "Mrs. / ma'am", "me": "me", "llamo": "my name is", "nombre": "name",
    "años": "years", "tengo": "I have", "vivo": "I live", "ciudad": "city"
  };

  const paragraphs = [
    { type: "p", text: "Escuchemos la historia de Elena, que es enfermera. Por favor, escucha la historia de Elena y después la historia contada por Elena. Intenta contestar algunas preguntas." },
    { type: "h2", text: "A) Narración en tercera persona" },
    { type: "p", text: "Elena es una enfermera profesional. Ella trabaja en un hospital grande. El señor García es un paciente en el hospital. El señor García tiene dolor de espalda. El dolor es muy fuerte. Elena ayuda al señor García. Ella le da una pastilla para el dolor. Elena es muy amable y paciente. Ella siempre cuida a sus pacientes con mucho cariño." },
    { type: "h2", text: "B) Narración en primera persona (contada por Elena)" },
    { type: "p", text: "Soy una enfermera profesional. Trabajo en un hospital grande. El señor García es un paciente en el hospital. El señor García tiene dolor de espalda. El dolor es muy fuerte. Ayudo al señor García. Le doy una pastilla para el dolor. Soy muy amable y paciente. Siempre cuido a mis pacientes con mucho cariño." },
    { type: "h2", text: "Preguntas para repetir y entender" },
    { type: "p", text: "¿Es Elena una doctora? No, Elena no es una doctora. Es una enfermera." },
    { type: "p", text: "¿Trabaja Elena en una escuela? No, Elena no trabaja en una escuela. Trabaja en un hospital." },
    { type: "p", text: "¿Tiene el señor García dolor de cabeza? No, el señor García no tiene dolor de cabeza. Tiene dolor de espalda." },
    { type: "p", text: "¿Es el dolor suave? No, el dolor no es suave. El dolor es muy fuerte." },
    { type: "p", text: "¿Qué le da Elena al señor García? Elena le da una pastilla para el dolor." },
    { type: "p", text: "¿Es Elena una persona grosera? No, Elena no es grosera. Ella es muy amable y paciente." }
  ];

  const storyEl = document.getElementById('story');
  paragraphs.forEach(({ type, text }) => {
    const el = document.createElement(type);
    text.split(/(\s+)/).forEach(token => {
      if (/^\s+$/.test(token)) { el.appendChild(document.createTextNode(token)); return; }
      const clean = token.replace(/[¿¡.,;:!?()"«»""'\-—]/g, '').toLowerCase().trim();
      if (!clean) { el.appendChild(document.createTextNode(token)); return; }
      const span = document.createElement('span');
      span.className = 'w'; span.textContent = token; span.dataset.word = clean;
      el.appendChild(span);
    });
    storyEl.appendChild(el);
  });

  const bar = document.getElementById('translation-bar');
  const twEl = document.getElementById('tw');
  const taEl = document.getElementById('ta');
  const tnEl = document.getElementById('tn');
  let activeW = null;

  storyEl.addEventListener('click', e => {
    const w = e.target.closest('.w');
    if (!w) return;
    if (activeW) activeW.classList.remove('active');
    if (activeW === w) { activeW = null; bar.classList.remove('visible'); return; }
    activeW = w; w.classList.add('active');
    const translation = dict[w.dataset.word];
    twEl.textContent = w.dataset.word;
    taEl.textContent = translation ? '→ ' + translation : '';
    tnEl.textContent = translation ? '' : '(no en diccionario)';
    bar.classList.add('visible');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.w') && !e.target.closest('#translation-bar')) {
      if (activeW) activeW.classList.remove('active');
      activeW = null; bar.classList.remove('visible');
    }
  });

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const pauseIcon = document.getElementById('pause-icon');
  const progressEl = document.getElementById('progress');
  const timeEl = document.getElementById('time-display');

  function fmt(s) { return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressEl.value = (audio.currentTime / audio.duration) * 100;
      timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    }
  });
  audio.addEventListener('ended', () => { playIcon.style.display=''; pauseIcon.style.display='none'; });
  playBtn.addEventListener('click', () => {
    if (audio.paused) { audio.play(); playIcon.style.display='none'; pauseIcon.style.display=''; }
    else { audio.pause(); playIcon.style.display=''; pauseIcon.style.display='none'; }
  });
  progressEl.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (progressEl.value / 100) * audio.duration;
  });
</script>
</body>
</html>
