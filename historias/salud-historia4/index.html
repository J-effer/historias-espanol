<h1>Historia Cuatro: La limpieza de la herida</h1>

<script>
const dict={
    "302":"three hundred and two",
    "historia":"history / story",
    "cuatro":"four",
    "la":"the",
    "limpieza":"cleaning",
    "de":"of / from",
    "herida":"wound",
    "ahora":"now",
    "escuchemos":"let's listen",
    "enfermera":"nurse",
    "sofía":"Sofía",
    "escucha":"listen",
    "y":"and",
    "después":"after / then",
    "versión":"version",
    "narración":"narration",
    "en":"in",
    "tercera":"third",
    "persona":"person",
    "entra":"enters",
    "habitación":"room",
    "el":"the",
    "paciente":"patient",
    "tiene":"has",
    "una":"a / an",
    "pierna":"leg",
    "derecha":"right",
    "está":"is",
    "un":"a / an",
    "poco":"little",
    "sucia":"dirty",
    "primero":"first",
    "se":"himself / herself",
    "pone":"puts (se pone = puts on)",
    "los":"the",
    "guantes":"gloves",
    "ella":"she",
    "limpia":"cleans / clean",
    "con":"with",
    "suero":"serum / saline",
    "fisiológico":"physiological",
    "gasas":"gauze",
    "dice":"says",
    "que":"that",
    "le":"to him / her",
    "duele":"hurts",
    "zona":"zone / area",
    "mucho":"much / a lot of",
    "cuidado":"care / caution",
    "finalmente":"finally",
    "vendaje":"bandage",
    "limpio":"clean",
    "sobre":"on / over",
    "protegida":"protected",
    "b":"B",
    "primera":"first",
    "contada":"told",
    "por":"by",
    "entro":"I enter",
    "me":"myself",
    "pongo":"I put (me pongo = I put on)",
    "preguntas":"questions",
    "para":"for",
    "repetir":"to repeat",
    "entender":"to understand",
    "qué":"what",
    "dónde":"where",
    "al":"at the",
    "principio":"beginning",
    "no":"no / not",
    "manos":"hands",
    "agua":"water",
    "jabón":"soap",
    "sí":"yes",
    "final":"end"
};
const paras=[{"type":"p","text":"historia y después la versión de Sofía."},{"type":"h2","text":"A) Narración en tercera persona"},{"type":"p","text":"Sofía entra en la habitación 302. El paciente tiene una herida en la pierna derecha. La herida está un poco sucia. Primero, Sofía se pone los guantes. Después, ella limpia la herida con suero fisiológico y gasas. El paciente dice que le duele un poco. Sofía limpia la zona con mucho cuidado. Finalmente, ella pone un vendaje limpio sobre la pierna. La herida ahora está limpia y protegida."},{"type":"h2","text":"B) Narración en primera persona (contada por Sofía)"},{"type":"p","text":"Entro en la habitación 302. El paciente tiene una herida en la pierna derecha. La herida está un poco sucia. Primero, me pongo los guantes. Después, limpio la herida con suero fisiológico y gasas. El paciente dice que le duele un poco. Limpio la zona con mucho cuidado. Finalmente, pongo un vendaje limpio sobre la pierna. La herida ahora está limpia y protegida."},{"type":"h2","text":"Preguntas para repetir y entender"},{"type":"p","text":"¿En qué habitación está el paciente? El paciente está en la habitación 302."},{"type":"p","text":"¿Dónde tiene la herida el paciente? El paciente tiene la herida en la pierna derecha."},{"type":"p","text":"¿Está la herida limpia al principio? No, la herida no está limpia. Está un poco sucia."},{"type":"p","text":"¿Qué se pone Sofía en las manos? Sofía se pone los guantes."},{"type":"p","text":"¿Limpia Sofía la herida con agua y jabón? No, ella la limpia con suero fisiológico y gasas."},{"type":"p","text":"¿Pone Sofía un vendaje al final? Sí, ella pone un vendaje limpio sobre la pierna."}];
const storyEl=document.getElementById('story');
paras.forEach(({type,text})=>{
  const el=document.createElement(type);
  text.split(/(\s+)/).forEach(token=>{
    if(/^\s+$/.test(token)){el.appendChild(document.createTextNode(token));return;}
    const clean=token.replace(/[¿¡.,;:!?()"«»""'\-—]/g,'').toLowerCase().trim();
    if(!clean){el.appendChild(document.createTextNode(token));return;}
    const s=document.createElement('span');s.className='w';s.textContent=token;s.dataset.word=clean;el.appendChild(s);
  });
  storyEl.appendChild(el);
});
const bar=document.getElementById('translation-bar');
const twEl=document.getElementById('tw'),taEl=document.getElementById('ta');
let aw=null;
storyEl.addEventListener('click',e=>{
  const w=e.target.closest('.w');if(!w)return;
  if(aw)aw.classList.remove('active');
  if(aw===w){aw=null;bar.classList.remove('visible');return;}
  aw=w;w.classList.add('active');
  const t=dict[w.dataset.word];
  twEl.textContent=w.dataset.word;taEl.textContent=t?'→ '+t:'(no en diccionario)';
  bar.classList.add('visible');
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.w')&&!e.target.closest('#translation-bar')){if(aw)aw.classList.remove('active');aw=null;bar.classList.remove('visible');}
});
const audio=document.getElementById('audio'),pb=document.getElementById('play-btn');
const pi=document.getElementById('play-icon'),pai=document.getElementById('pause-icon');
const pr=document.getElementById('progress'),te=document.getElementById('time-display');
function fmt(s){return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');}
audio.addEventListener('timeupdate',()=>{if(audio.duration){pr.value=(audio.currentTime/audio.duration)*100;te.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);}});
audio.addEventListener('ended',()=>{pi.style.display='';pai.style.display='none';});
pb.addEventListener('click',()=>{if(audio.paused){audio.play();pi.style.display='none';pai.style.display='';}else{audio.pause();pi.style.display='';pai.style.display='none';}});
pr.addEventListener('input',()=>{if(audio.duration)audio.currentTime=(pr.value/100)*audio.duration;});
</script>
