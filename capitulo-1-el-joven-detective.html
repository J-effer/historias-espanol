<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capítulo 1: El Joven Detective</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #faf9f6;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .chapter-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
      font-family: 'Helvetica Neue', sans-serif;
    }

    h1 {
      font-size: 28px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      font-family: 'Helvetica Neue', sans-serif;
      margin-bottom: 2rem;
    }

    .subtitle span {
      display: inline-block;
      background: #eef4ff;
      color: #3a6bc4;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* Audio player */
    .audio-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid #e8e4dc;
    }

    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .play-btn:hover { background: #f5f5f5; border-color: #bbb; }

    .play-btn svg { width: 14px; height: 14px; fill: #1a1a1a; }

    .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    #progress {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0dbd0;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
    }

    #progress::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
      border: none;
    }

    .time-display {
      font-size: 12px;
      color: #999;
      font-family: 'Helvetica Neue', sans-serif;
    }

    /* Story text */
    .story {
      font-size: 18px;
      line-height: 2.1;
      color: #1a1a1a;
    }

    .story p { margin-bottom: 1.4rem; }

    .word {
      cursor: pointer;
      padding: 1px 3px;
      border-radius: 3px;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }

    .word:hover {
      background: #ddeaff;
      color: #1a4fa8;
    }

    .word.active {
      background: #ddeaff;
      color: #1a4fa8;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #fff;
      border: 1px solid #e0dbd0;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Helvetica Neue', sans-serif;
      pointer-events: none;
      z-index: 9999;
      max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: none;
    }

    .tooltip .tt-en {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .tooltip .tt-note {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .tooltip .tt-loading {
      font-size: 13px;
      color: #aaa;
    }

    /* Hint bar */
    .hint {
      font-size: 13px;
      color: #999;
      font-family: 'Helvetica Neue', sans-serif;
      margin-bottom: 1.5rem;
      padding: 8px 14px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e4dc;
    }

    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .story { font-size: 16px; line-height: 2; }
    }
  </style>
</head>
<body>
<div class="container">

  <p class="chapter-label">Historia en español</p>
  <h1>Capítulo 1: El Joven Detective</h1>
  <p class="subtitle"><span>Haz clic en cualquier palabra para ver su traducción</span></p>

  <div class="audio-bar">
    <button class="play-btn" id="play-btn" title="Reproducir / Pausar">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <div class="progress-wrap">
      <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
      <span class="time-display" id="time-display">0:00 / 0:00</span>
    </div>
  </div>

  <p class="hint">👆 Haz clic en cualquier palabra para ver su traducción al inglés</p>

  <div class="story" id="story"></div>

</div>

<div class="tooltip" id="tooltip">
  <div class="tt-loading" id="tt-loading">Traduciendo...</div>
  <div class="tt-en" id="tt-en" style="display:none"></div>
  <div class="tt-note" id="tt-note"></div>
</div>

<audio id="audio"></audio>

<script>
  // ── Audio ──────────────────────────────────────────────
  const AUDIO_ID = "1TZHOg-ue6scOv_NNx5VhjYI8aG_sHdhX";
  const audio = document.getElementById('audio');
  audio.src = `https://drive.google.com/uc?export=download&id=${AUDIO_ID}`;

  const playBtn    = document.getElementById('play-btn');
  const playIcon   = document.getElementById('play-icon');
  const pauseIcon  = document.getElementById('pause-icon');
  const progressEl = document.getElementById('progress');
  const timeEl     = document.getElementById('time-display');

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressEl.value = (audio.currentTime / audio.duration) * 100;
      timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    }
  });

  audio.addEventListener('ended', () => {
    playIcon.style.display = '';
    pauseIcon.style.display = 'none';
  });

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playIcon.style.display = 'none';
      pauseIcon.style.display = '';
    } else {
      audio.pause();
      playIcon.style.display = '';
      pauseIcon.style.display = 'none';
    }
  });

  progressEl.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (progressEl.value / 100) * audio.duration;
  });

  // ── Story text ─────────────────────────────────────────
  const storyText = `Este es Georg. Vive en Friburgo, una hermosa ciudad al sur de Alemania, cerca de la Selva Negra. Georg tiene quince años. Es alto para su edad, tiene el pelo rojo y los ojos azules. A la mayoría de las chicas les parece guapo, pero a él eso no le importa; lo único que le interesa es todo lo que tenga que ver con el crimen.

En los últimos dos años, ha leído más de doscientos libros de crímenes y ha visto aproximadamente la misma cantidad de películas policíacas. En su estantería, junto a los clásicos como Agatha Christie, Simenon y Chandler, también hay novelas de autores no tan famosos. Al lado del estante siempre está su manual: "Cómo convertirse en un detective eficiente".

Cuando sea grande, Georg quiere ser, por supuesto, detective o policía. Se lo ha dicho a sus padres muchas veces. Su madre suele responder: "Sí, sí, Georg... eso son solo fantasías. La realidad es muy distinta".

Su padre incluso se llega a enfadar: "Deberías pensar más en la escuela, Georg, y no ver siempre esas películas idióticas en la televisión".

Nadie lo entiende en esa familia. Pobre Georg. Él tiene una hermana llamada Ute, de cinco años. Georg la quiere, pero a menudo le parece aburrida. Ella siempre quiere jugar, pero Georg no tiene ni tiempo ni ganas.

Ayer, su madre le dijo: "Georg, mañana por la noche tu padre y yo queremos ir al teatro. Hace meses que solo veo el supermercado. Prácticamente nunca salimos, así que por una vez podríamos..."

Georg estaba en el séptimo cielo. Pensó: "Qué maravilla. Todo el apartamento para mí solo. Comer lo que quiera y cuando quiera, y la televisión grande solo para mí". A su madre le respondió: "Sí, mamá, buena idea. Id tranquilos, yo cuidaré de Ute".

"¿Puedo confiar en ti?", preguntó ella. "¡Claro que sí!".

Así que hoy Georg está (casi) solo en casa. Sus padres se fueron antes de la cena, ya que la función empieza a las ocho. La cena ya está lista sobre la mesa de la cocina: salchichas, pan, una botella de agua mineral y pudín. Pero él no tiene ganas de comer algo tan "banal". Saca palomitas, patatas fritas y dos latas de cola del armario de la cocina y se planta frente al televisor. "¡Ahhh, esto sí es vida!".

En la tele dan "Expediente X", una de sus series favoritas. Su hermanita se sienta a su lado, pero a la media hora ya se ha quedado dormida. Durante los anuncios, Georg va a la cocina para buscar más provisiones. De repente, escucha un ruido. Viene del apartamento de al lado: oye algo caer, un grito corto y luego, nada más.

"Vaya...", piensa Georg.

Pero mientras se unta un pan con Nutella, vuelve a escuchar ruidos. "Serán los vecinos", piensa, y se acerca a la puerta. Mira por la mirilla: un hombre, su vecino, está en la puerta y mira hacia afuera para ver si hay alguien. "Qué extraño", se dice Georg a sí mismo. "¿Qué estará pasando ahí?".

En ese momento suena el teléfono: es (naturalmente) su madre, preguntando si todo está en orden. Luego le dice que no estarán en casa antes de medianoche.

"Vale, vale, no hay problema", dice Georg.

Vuelve a acercarse a la puerta, pero ya no oye nada. Y el vecino tampoco está ya allí.`;

  const storyEl = document.getElementById('story');

  function renderStory() {
    const paragraphs = storyText.split('\n\n');
    storyEl.innerHTML = paragraphs.map(p => {
      const tokens = p.split(/(\s+)/);
      const html = tokens.map(token => {
        if (/^\s+$/.test(token)) return token;
        const clean = token.replace(/[¿¡.,;:!?()"«»""'\-—]/g, '').trim().toLowerCase();
        if (!clean) return token;
        const before = token.match(/^[¿¡"«"('—]*/)?.[0] || '';
        const after  = token.match(/[.,;:!?)"»"'\-—]*$/)?.[0] || '';
        const core   = token.slice(before.length, token.length - after.length);
        return `${before}<span class="word" data-word="${clean}">${core}</span>${after}`;
      }).join('');
      return `<p>${html}</p>`;
    }).join('');
  }

  renderStory();

  // ── Translations ───────────────────────────────────────
  const cache = {};
  const tooltip  = document.getElementById('tooltip');
  const ttLoading = document.getElementById('tt-loading');
  const ttEn     = document.getElementById('tt-en');
  const ttNote   = document.getElementById('tt-note');
  let activeWord = null;

  function positionTooltip(el) {
    const rect = el.getBoundingClientRect();
    let top = rect.top - 70;
    if (top < 8) top = rect.bottom + 8;
    let left = rect.left;
    if (left + 230 > window.innerWidth) left = window.innerWidth - 235;
    tooltip.style.top  = top + 'px';
    tooltip.style.left = left + 'px';
  }

  async function translate(word) {
    if (cache[word]) return cache[word];
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 80,
        messages: [{
          role: "user",
          content: `Translate the Spanish word or short expression "${word}" to English. Reply ONLY with a JSON object (no markdown): {"en": "english", "note": "short grammar or usage note, or empty string"}`
        }]
      })
    });
    const data = await res.json();
    const raw  = data.content?.[0]?.text || '{}';
    try {
      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      cache[word] = parsed;
      return parsed;
    } catch(e) {
      return { en: word, note: '' };
    }
  }

  function showTooltip(el, word) {
    ttLoading.style.display = '';
    ttEn.style.display = 'none';
    ttNote.textContent = '';
    positionTooltip(el);
    tooltip.style.display = 'block';

    translate(word).then(result => {
      ttLoading.style.display = 'none';
      ttEn.style.display = '';
      ttEn.textContent = result.en || word;
      ttNote.textContent = result.note || '';
    });
  }

  storyEl.addEventListener('click', e => {
    const w = e.target.closest('.word');
    if (!w) { hideTooltip(); return; }
    if (activeWord === w) { hideTooltip(); return; }
    if (activeWord) activeWord.classList.remove('active');
    activeWord = w;
    w.classList.add('active');
    showTooltip(w, w.dataset.word);
  });

  function hideTooltip() {
    tooltip.style.display = 'none';
    if (activeWord) activeWord.classList.remove('active');
    activeWord = null;
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.word') && !e.target.closest('.tooltip')) hideTooltip();
  });

  window.addEventListener('scroll', () => {
    if (activeWord) positionTooltip(activeWord);
  }, { passive: true });
</script>
</body>
</html>
